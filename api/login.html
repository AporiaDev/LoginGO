<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión - Portal de Acceso</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #2c3e50; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #2980b9; }
        .toggle-link { display: block; text-align: center; margin-top: 15px; color: #3498db; cursor: pointer; text-decoration: none; }
        .toggle-link:hover { text-decoration: underline; }
        .hidden { display: none; }
        #mensajeError { color: #e74c3c; text-align: center; margin-top: 10px; font-weight: bold; }
        .perfil-data { background: #ecf0f1; padding: 15px; border-radius: 4px; margin-top: 15px; }
    </style>
</head>
<body>

<div class="card" id="contenedorAutenticacion">
    <h2>Iniciar Sesión</h2>
    
    <input type="email" id="correo" placeholder="Correo electrónico" required>
    <input type="password" id="password" placeholder="Contraseña" required>
    
    <button id="btnSubmit" onclick="iniciarSesion()">Entrar al Sistema</button>
    <div id="mensajeError"></div>
    
    <a href="register.html" class="toggle-link">¿No tienes cuenta? Regístrate aquí</a>
</div>

<div class="card hidden" id="contenedorPerfil">
    <h2>Panel de Investigador</h2>
    <p>Bienvenido al sistema. Tus credenciales han sido verificadas.</p>
    <div class="perfil-data">
        <p><strong>Nombre:</strong> <span id="perfilNombre"></span></p>
        <p><strong>Correo:</strong> <span id="perfilCorreo"></span></p>
    </div>
    <button style="margin-top: 20px; background-color: #e74c3c;" onclick="cerrarSesion()">Cerrar Sesión</button>
</div>

<script>
    async function iniciarSesion() {
        const correo = document.getElementById('correo').value;
        const password = document.getElementById('password').value;
        const url = 'http://localhost:8080/api/login';
        const payload = { correo, password };

        try {
            const respuesta = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await respuesta.json();

            if (data.success) {
                mostrarPerfil(data.data.username, data.data.correo);
            } else {
                document.getElementById('mensajeError').innerText = data.error.message || "Credenciales incorrectas.";
            }
        } catch (error) {
            document.getElementById('mensajeError').innerText = "Error de red: No se pudo conectar al servidor.";
        }
    }

    function mostrarPerfil(username, correo) {
        document.getElementById('contenedorAutenticacion').classList.add('hidden');
        document.getElementById('contenedorPerfil').classList.remove('hidden');
        document.getElementById('perfilNombre').innerText = username;
        document.getElementById('perfilCorreo').innerText = correo;
    }

    function cerrarSesion() {
        document.getElementById('contenedorPerfil').classList.add('hidden');
        document.getElementById('contenedorAutenticacion').classList.remove('hidden');
        document.getElementById('correo').value = '';
        document.getElementById('password').value = '';
        document.getElementById('mensajeError').innerText = '';
    }
</script>

</body>
</html>
